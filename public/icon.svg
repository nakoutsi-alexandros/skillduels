<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B63FF"/>
      <stop offset="0.5" stop-color="#5A5CFF"/>
      <stop offset="1" stop-color="#B14BFF"/>
    </linearGradient>
    <radialGradient id="hi" cx="0.3" cy="0.24" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.62" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C7D8FF"/>
    </linearGradient>
    <linearGradient id="hilt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE28A"/>
      <stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#08122E" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#hi)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#vig)"/>

  <!-- crossed swords emblem -->
  <g transform="translate(512 522)" filter="url(#soft)">
    <!-- glow behind blades -->
    <g opacity="0.5">
      <g transform="rotate(-46)"><rect x="-30" y="-360" width="60" height="360" rx="30" fill="#BFE0FF" opacity="0.35"/></g>
      <g transform="rotate(46)"><rect x="-30" y="-360" width="60" height="360" rx="30" fill="#BFE0FF" opacity="0.35"/></g>
    </g>

    <!-- sword A -->
    <g transform="rotate(-46)">
      <polygon points="0,-366 26,-150 26,-20 -26,-20 -26,-150" fill="url(#blade)"/>
      <line x1="0" y1="-344" x2="0" y2="-34" stroke="#9FB8E8" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
      <rect x="-82" y="-20" width="164" height="26" rx="13" fill="url(#hilt)"/>
      <rect x="-16" y="6" width="32" height="130" rx="12" fill="url(#hilt)"/>
      <circle cx="0" cy="152" r="26" fill="url(#hilt)"/>
    </g>
    <!-- sword B -->
    <g transform="rotate(46)">
      <polygon points="0,-366 26,-150 26,-20 -26,-20 -26,-150" fill="url(#blade)"/>
      <line x1="0" y1="-344" x2="0" y2="-34" stroke="#9FB8E8" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
      <rect x="-82" y="-20" width="164" height="26" rx="13" fill="url(#hilt)"/>
      <rect x="-16" y="6" width="32" height="130" rx="12" fill="url(#hilt)"/>
      <circle cx="0" cy="152" r="26" fill="url(#hilt)"/>
    </g>

    <!-- center spark -->
    <g transform="translate(0 -70)">
      <path d="M0 -66 L15 -15 L66 0 L15 15 L0 66 L-15 15 L-66 0 L-15 -15 Z" fill="#FFFFFF"/>
      <circle cx="0" cy="0" r="13" fill="#7FE8FF"/>
    </g>
  </g>
</svg>
